
version: 0.0.{build}

image: 
  - Visual Studio 2015
  - Visual Studio 2022
configuration: "Debug"

build_script:
 - ps: Set-Service wuauserv -StartupType Manual #otherwise, choco command exits with code 1058

cache:
  - C:\ProgramData\chocolatey\bin -> appveyor.yml
  - C:\ProgramData\chocolatey\lib -> appveyor.yml
  - C:\Program Files\WindowsPowerShell\Modules\PSScriptAnalyzer -> appveyor.yml
  - C:\Program Files\WindowsPowerShell\Modules\Pester -> appveyor.yml
  - C:\Users\Administrator\Documents\WindowsPowerShell\Modules\dbatools.library -> dbatools.psd1

for:
  - 
    matrix:
      only:
        - image: Visual Studio 2015
    environment:
      matrix:
        - scenario: 2008R2
          services: mssql2008r2sp2
          main_instance: localhost\SQL2008R2SP2
          setup_scripts: \tests\appveyor.SQL2008R2SP2.ps1
        - scenario: 2012
          services: SQL2012SP1
          main_instance: localhost\SQL2012SP1
        - scenario: 2014
          services: SQL2014SP2
          main_instance: localhost\SQL2014SP2
        - scenario: 2016
          services: mssql2016
          main_instance: localhost\SQL2016
          setup_scripts: \tests\appveyor.SQL2016.ps1
        - scenario: 2017
          main_instance: localhost\SQL2017,localhost\SQL2016

  -
    matrix:
      only:
        - image: Visual Studio 2022
    environment:
      matrix:
        - scenario: 2017
          services: mssql2017
          main_instance: localhost\SQL2017
          setup_scripts: \tests\appveyor.SQL2017.ps1
        - scenario: 2019
          services: mssql2019
          main_instance: localhost\SQL2019



