
version: 1.0.{build}

image: Visual Studio 2019

environment:
  matrix:
    - SQL_SERVER_VERSION: 2012
    - SQL_SERVER_VERSION: 2014
    - SQL_SERVER_VERSION: 2016
    - SQL_SERVER_VERSION: 2017
    - SQL_SERVER_VERSION: 2019

install:
  - ps: Install-SQLServer -Version $env:SQL_SERVER_VERSION

build_script:
  - cmd: |
     echo Building with SQL Server %SQL_SERVER_VERSION%
     msbuild MySolution.sln /p:Configuration=Release

test_script:
  - cmd: |
     echo Running tests with SQL Server %SQL_SERVER_VERSION%
     vstest.console.exe MyTests.dll

artifacts:
  - path: '**\*.dll'
    name: MyProject
