# See http://www.appveyor.com/docs/appveyor-yml for many more options
version: 0.0.{build}

branches: 
  Only: Development

skip_branch_with_pr: true


image: 
  - Visual Studio 2015
  - Visual Studio 2022

configuration: "Debug"

build_script:
 - ps: Set-Service wuauserv -StartupType Manual #otherwise, choco command exits with code 1058


cache:
  - C:\ProgramData\chocolatey\bin -> appveyor.yml
  - C:\ProgramData\chocolatey\lib -> appveyor.yml
  - C:\Program Files\WindowsPowerShell\Modules\PSScriptAnalyzer -> appveyor.yml
  - C:\Program Files\WindowsPowerShell\Modules\Pester -> appveyor.yml
  - C:\Program Files\WindowsPowerShell\Modules\dbatools.library -> dbatools.psd1

#shallow_clone: true
clone_depth: 100

# Set build info
environment:
  environment: development
  version: 0.0.$(appveyor_build_number)
  appveyor_rdp_password: gots0fairfax.step-LASTING5nixon

test_script:
  - ps: Write-Host "common test script"
matrix:
  - fast_finish: true
for:
  - 
    matrix:
      only:
        - image: Visual Studio 2015
    Scenarios:
      - Scenario: 2008R2
        Services: mssql2008r2sp2
        main_instance: localhost\SQL2008R2SP2
      - Scenario: 2012
        Services: SQL2012SP1
        main_instance: localhost\SQL2012SP1
      - Scenario: 2014
        Services: SQL2014SP2
        main_instance: localhost\SQL2014SP2
      - Scenario: 2016
        Services: mssql2016
        main_instance: localhost\SQL2016
    matrix:
      only:
        - image: Visual Studio 2022
    Scenarios:
      - Scenario: 2017
        Services: mssql2017
        main_instance: localhost\SQL2017
      - Scenario: 2019
        Services: mssql2019
        main_instance: localhost\SQL2019
    init:
      - net start MSSQL$SQL2019


